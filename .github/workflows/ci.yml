name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20"
          cache: true

      - name: Install GCC (required for CGO / go-sqlite3)
        run: sudo apt-get install -y gcc

      - name: go vet
        run: go vet ./...
        env:
          CGO_ENABLED: "1"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1
        env:
          CGO_ENABLED: "1"

      - name: Run Go tests (with race detector)
        run: go test -race ./...
        env:
          CGO_ENABLED: "1"

      - name: Build binary
        run: go build -o nagare .
        env:
          CGO_ENABLED: "1"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Type check
        working-directory: web
        run: npx tsc --noEmit

      - name: Check formatting
        working-directory: web
        run: npm run format:check

      - name: Run frontend tests
        working-directory: web
        run: npm run test:ci

      - name: Build frontend
        working-directory: web
        run: npm run build

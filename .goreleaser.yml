version: 2

# Build the frontend before compiling Go binaries.
# The Go embed directive (//go:embed all:web/out) requires web/out to exist at compile time.
before:
  hooks:
    - sh -c "cd web && npm ci"
    - sh -c "cd web && npm run build"

builds:
  - id: nagare
    main: .
    binary: nagare
    env:
      - CGO_ENABLED=1
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # Running on macos-latest runner:
    # - darwin targets use the native Clang (no override needed)
    # - linux targets use Zig for cross-compilation
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=zig cc -target x86_64-linux-musl
          - CXX=zig c++ -target x86_64-linux-musl
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=zig cc -target aarch64-linux-musl
          - CXX=zig c++ -target aarch64-linux-musl

archives:
  - id: nagare
    builds: [nagare]
    name_template: "nagare_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # Include the sample nagare.yaml so users have a starting config
    files:
      - nagare.yaml

checksum:
  name_template: "nagare_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Other Changes"
      order: 999

release:
  github:
    owner: alephmelo
    name: nagare
  draft: false
  prerelease: auto
  name_template: "Nagare {{ .Tag }}"

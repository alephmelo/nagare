id: webhook_demo
description: "A DAG triggered by a GitHub-like webhook payload"
schedule: "workflow_dispatch"
trigger:
  type: webhook
  path: "/api/webhooks/github"
  method: "POST"
  # secret: "changeme"          # Uncomment and set to enable HMAC-SHA256 verification.
  #                              # The sender must include a matching X-Hub-Signature-256
  #                              # header (e.g. "sha256=<hex>").  Compatible with GitHub,
  #                              # GitLab, and any system that supports HMAC webhooks.
  #
  # signature_header: "X-Hub-Signature-256"  # Optional override; defaults to X-Hub-Signature-256.
  extract_payload:
    COMMIT_AUTHOR: ".pusher.name"
    COMMIT_HASH: ".head_commit.id"
    REPO_NAME: ".repository.full_name"
tasks:
  - id: print_payload
    type: command
    command: |
      echo "Received Webhook!"
      echo "Repo: $REPO_NAME"
      echo "Author: $COMMIT_AUTHOR"
      echo "Commit: $COMMIT_HASH"
